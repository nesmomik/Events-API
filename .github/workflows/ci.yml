name: CI

on:
  push:
    branches:
      - main
      - feature-continuous-deployment
  pull_request:
    branches:
      - main
      - feature-continuous-deployment
  workflow_dispatch:

jobs:
  unit-and-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        run: uv run pytest tests/integration

  container-tests:
    needs: unit-and-integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t events-api:test .

      - name: Start container
        run: docker run -d -p 5000:5000 --name events-api-test events-api:test

      - name: Wait for container to be healthy
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:5000/api/health; then
              echo "App in container is ready."
              exit 0
            fi
            sleep 2
          done
          echo "App in container failed."
          docker logs events-api-test
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run container tests
        env:
          CONTAINER_URL: http://localhost:5000
        run: uv run pytest tests/container

      - name: Stop and remove container
        if: always()
        run: |
          docker stop events-api-test || true
          docker rm events-api-test || true

  render-deployment:
    needs: container-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ vars.DOCKER_HUB_USER }}/events-api:latest .

      - name: Push Docker image
        run: docker push ${{ vars.DOCKER_HUB_USER }}/events-api:latest

      - name: Trigger deploy webhook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait for service to be healthy
        run: |
          for i in {1..40}; do
            if curl -sf https://${{ vars.RENDER_BASE_URL }}/api/health; then
              echo "API is healthy."
              exit 0
            fi
            sleep 3
          done
          echo "Deployment failed."
          exit 1

